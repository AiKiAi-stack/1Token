name: Release CLI Tool

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.0.0

permissions:
  contents: write  # Required for creating releases

jobs:
  release:
    name: Build and Release CLI
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.x

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm db:generate

      - name: Build CLI distribution  
        run: |
          mkdir -p cli/dist
          cp cli/cli-tool.js cli/dist/cli-tool.js
          chmod +x cli/dist/cli-tool.js

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION=${{ github.ref_name }}
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git tag | sort -V | head -n 1)
          
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline "$LAST_TAG..HEAD")
          else
            COMMITS=$(git log --oneline)
          fi
          
          NOTES="## CLI Tool Features\n\n"
          NOTES="${NOTES}- \`1token get <platform>\` - Get token and copy to clipboard\n"
          NOTES="${NOTES}- \`1token list\` - List all tokens\n"
          NOTES="${NOTES}- Cross-platform clipboard support\n"
          NOTES="${NOTES}- Secure end-to-end encryption\n\n"
          NOTES="${NOTES}## Changelog\n"
          
          for commit in $COMMITS; do
            if [ -n "$commit" ]; then
              NOTES="${NOTES}\n- $commit"
            fi
          done
          
          ESCAPED=$(echo "$NOTES" | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "body=$ESCAPED" >> $GITHUB_OUTPUT

      - name: Create GitHub Release 
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.body }}
          draft: false
          prerelease: false

  build-platforms:
    needs: release
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            artifact: 1token-linux.tar.gz
            
          - os: windows-latest
            platform: windows-x64
            artifact: 1token-windows.zip
            
          - os: macos-latest
            platform: macos-x64
            artifact: 1token-macos.tar.gz
            
          - os: macos-latest
            platform: macos-arm64
            artifact: 1token-macos-arm64.tar.gz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.x

      - name: Prepare CLI
        run: |
          mkdir -p cli/dist
          cp cli/cli-tool.js cli/dist/1token
          chmod +x cli/dist/1token
          
          echo '{
            "name": "1token-cli",
            "version": "0.1.1",
            "bin": { "1token": "./1token" },
            "description": "Secure API Token Manager CLI",
            "dependencies": { "node-fetch": "^2.7.0" }
          }' > cli/dist/package.json

      - name: Create ${{ matrix.platform }} package
        run: |
          VERSION=${{ github.ref_name }}
          PLATFORM_NAME="${{ matrix.platform }}"
          OUTPUT_DIR="1token-${VERSION}-${PLATFORM_NAME}"
          mkdir -p "$OUTPUT_DIR"
          
          cp cli/dist/1token "$OUTPUT_DIR/"
          cp cli/dist/package.json "$OUTPUT_DIR/"
          
          cd "$OUTPUT_DIR"
          npm install node-fetch@2
          cd ..
          
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            7z a "${OUTPUT_DIR}.zip" "$OUTPUT_DIR/"
            echo "ARTIFACT_FILE=${OUTPUT_DIR}.zip" >> $GITHUB_ENV
          else
            tar -czf "${OUTPUT_DIR}.tar.gz" "$OUTPUT_DIR/"
            echo "ARTIFACT_FILE=${OUTPUT_DIR}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload ${{ matrix.platform }} asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./${{ env.ARTIFACT_FILE }}
          asset_name: ${{ env.ARTIFACT_FILE }}
          asset_content_type: application/gzip
